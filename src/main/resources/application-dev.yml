server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:checktrans;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

checktrans:
  audit:
    enabled: false

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="es">
<head>
    <title>CHECKTRANS - Item</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates}">Plantillas</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions(id=${phase.versionId})}">Versiones</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions/{vId}/phases(id=${templateId}, vId=${versionId})}">Fases</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions/{vId}/phases/{pId}/items(id=${templateId}, vId=${versionId}, pId=${phase.id})}">Items</a></li>
                        <li class="breadcrumb-item active" aria-current="page"
                            th:text="${itemId != null} ? 'Editar Item' : 'Nuevo Item'">
                            Nuevo Item
                        </li>
                    </ol>
                </nav>
                <h1 th:text="${itemId != null} ? 'Editar Item' : 'Nuevo Item'">
                    Nuevo Item
                </h1>
            </div>
            <div class="page-actions">
                <a th:href="@{/templates/{id}/versions/{vId}/phases/{pId}/items(id=${templateId}, vId=${versionId}, pId=${phase.id})}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-1"></i>Volver
                </a>
            </div>
        </div>

        <div class="card card-checktrans">
            <div class="card-header">
                <h5><i class="fas fa-list-check me-2"></i>Datos del Item</h5>
            </div>
            <div class="card-body">
                <form th:action="${itemId != null}
                        ? @{/templates/{id}/versions/{vId}/phases/{pId}/items/{iId}/edit(id=${templateId}, vId=${versionId}, pId=${phase.id}, iId=${itemId})}
                        : @{/templates/{id}/versions/{vId}/phases/{pId}/items(id=${templateId}, vId=${versionId}, pId=${phase.id})}"
                      th:object="${item}" method="post"
                      class="form-checktrans needs-validation" novalidate>
                    <div class="row g-3">
                        <div class="col-md-2">
                            <label for="itemOrder" class="form-label required">Orden</label>
                            <input type="number" id="itemOrder" th:field="*{itemOrder}"
                                   class="form-control" th:classappend="${#fields.hasErrors('itemOrder')} ? 'is-invalid'"
                                   min="1" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('itemOrder')}"
                                 th:errors="*{itemOrder}">Error</div>
                        </div>
                        <div class="col-md-3">
                            <label for="code" class="form-label required">C&oacute;digo</label>
                            <input type="text" id="code" th:field="*{code}"
                                   class="form-control" th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"
                                   maxlength="20" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('code')}"
                                 th:errors="*{code}">Error</div>
                        </div>
                        <div class="col-md-5">
                            <label for="description" class="form-label required">Descripci&oacute;n</label>
                            <input type="text" id="description" th:field="*{description}"
                                   class="form-control" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                   maxlength="500" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                                 th:errors="*{description}">Error</div>
                        </div>
                        <div class="col-md-2">
                            <label for="itemType" class="form-label required">Tipo</label>
                            <select id="itemType" th:field="*{itemType}"
                                    class="form-select" th:classappend="${#fields.hasErrors('itemType')} ? 'is-invalid'"
                                    required>
                                <option th:each="type : ${itemTypes}" th:value="${type}" th:text="${type}">YES_NO_NA</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('itemType')}"
                                 th:errors="*{itemType}">Error</div>
                        </div>
                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input type="checkbox" id="required" th:field="*{required}"
                                       class="form-check-input" th:classappend="${#fields.hasErrors('required')} ? 'is-invalid'"
                                       value="true">
                                <label for="required" class="form-check-label">Obligatorio</label>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('required')}"
                                     th:errors="*{required}">Error</div>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/templates/{id}/versions/{vId}/phases/{pId}/items(id=${templateId}, vId=${versionId}, pId=${phase.id})}"
                           class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Guardar Item
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

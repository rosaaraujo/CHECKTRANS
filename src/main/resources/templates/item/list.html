<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="es">
<head>
    <title>CHECKTRANS - Items</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates}">Plantillas</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions(id=${phase.versionId})}">Versiones</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions/{vId}/phases(id=${templateId}, vId=${versionId})}">Fases</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${phase.name}">Items</li>
                    </ol>
                </nav>
                <h1>
                    Items de <span th:text="${phase.name}">Fase 1</span>
                </h1>
            </div>
            <div class="page-actions">
                <a th:href="@{/templates/{id}/versions/{vId}/phases/{pId}/items/new(id=${templateId}, vId=${versionId}, pId=${phase.id})}" class="btn btn-accent">
                    <i class="fas fa-plus me-1"></i>Nuevo Item
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(items)}">
            <div class="card card-checktrans">
                <div class="card-body">
                    <div class="empty-state">
                        <i class="fas fa-list-check"></i>
                        <h5>No hay items</h5>
                        <p>A&ntilde;ada items a esta fase de la plantilla</p>
                        <a th:href="@{/templates/{id}/versions/{vId}/phases/{pId}/items/new(id=${templateId}, vId=${versionId}, pId=${phase.id})}" class="btn btn-accent mt-2">
                            <i class="fas fa-plus me-1"></i>Crear Primer Item
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${not #lists.isEmpty(items)}">
            <div class="card card-checktrans">
                <div class="table-responsive">
                    <table class="table table-checktrans">
                        <thead>
                            <tr>
                                <th>Orden</th>
                                <th>C&oacute;digo</th>
                                <th>Descripci&oacute;n</th>
                                <th class="d-none d-md-table-cell">Tipo</th>
                                <th class="d-none d-md-table-cell">Obligatorio</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${items}">
                                <td data-label="Orden">
                                    <span class="badge bg-light text-dark" th:text="${item.itemOrder}">1</span>
                                </td>
                                <td data-label="C&oacute;digo">
                                    <strong th:text="${item.code}">ITEM-001</strong>
                                </td>
                                <td data-label="Descripci&oacute;n" th:text="${item.description}">Verificar</td>
                                <td data-label="Tipo" class="d-none d-md-table-cell">
                                    <span th:if="${item.itemType == 'YES_NO_NA'}" class="badge bg-info">SI/NO/NA</span>
                                    <span th:unless="${item.itemType == 'YES_NO_NA'}" class="badge bg-secondary" th:text="${item.itemType}">TIPO</span>
                                </td>
                                <td data-label="Obligatorio" class="d-none d-md-table-cell">
                                    <span th:if="${item.required}" class="badge bg-success">SI</span>
                                    <span th:unless="${item.required}" class="badge bg-secondary">NO</span>
                                </td>
                                <td data-label="Acciones" class="text-end">
                                    <div class="btn-group btn-group-sm">
                                        <form th:action="@{/templates/{id}/versions/{vId}/phases/{pId}/items/{iId}/moveUp(id=${templateId}, vId=${versionId}, pId=${phase.id}, iId=${item.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-secondary"
                                                    th:disabled="${itemStat.first}"
                                                    th:title="Subir">
                                                <i class="fas fa-chevron-up"></i>
                                            </button>
                                        </form>
                                        <form th:action="@{/templates/{id}/versions/{vId}/phases/{pId}/items/{iId}/moveDown(id=${templateId}, vId=${versionId}, pId=${phase.id}, iId=${item.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-secondary"
                                                    th:disabled="${itemStat.last}"
                                                    th:title="Bajar">
                                                <i class="fas fa-chevron-down"></i>
                                            </button>
                                        </form>
                                    </div>
                                    <a th:href="@{/templates/{id}/versions/{vId}/phases/{pId}/items/{iId}/edit(id=${templateId}, vId=${versionId}, pId=${phase.id}, iId=${item.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form th:action="@{/templates/{id}/versions/{vId}/phases/{pId}/items/{iId}/delete(id=${templateId}, vId=${versionId}, pId=${phase.id}, iId=${item.id})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('&iquest;Est&aacute; seguro de eliminar este item?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

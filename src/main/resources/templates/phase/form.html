<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="es">
<head>
    <title>CHECKTRANS - Fase</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates}">Plantillas</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}(id=${version.templateId})}" th:text="${version.templateCode}">TMP-001</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions(id=${version.templateId})}">Versiones</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions/{vId}(id=${version.templateId}, vId=${version.id})}" th:text="'v' + ${version.versionNumber}">v1</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions/{vId}/phases(id=${version.templateId}, vId=${version.id})}">Fases</a></li>
                        <li class="breadcrumb-item active" aria-current="page"
                            th:text="${phaseId != null} ? 'Editar Fase' : 'Nueva Fase'">
                            Nueva Fase
                        </li>
                    </ol>
                </nav>
                <h1 th:text="${phaseId != null} ? 'Editar Fase' : 'Nueva Fase'">
                    Nueva Fase
                </h1>
            </div>
            <div class="page-actions">
                <a th:href="@{/templates/{id}/versions/{vId}/phases(id=${version.templateId}, vId=${version.id})}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-1"></i>Volver
                </a>
            </div>
        </div>

        <div class="card card-checktrans">
            <div class="card-header">
                <h5><i class="fas fa-layer-group me-2"></i>Datos de la Fase</h5>
            </div>
            <div class="card-body">
                <form th:action="${phaseId != null}
                        ? @{/templates/{id}/versions/{vId}/phases/{pId}/edit(id=${version.templateId}, vId=${version.id}, pId=${phaseId})}
                        : @{/templates/{id}/versions/{vId}/phases(id=${version.templateId}, vId=${version.id})}"
                      th:object="${phase}" method="post"
                      class="form-checktrans needs-validation" novalidate>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="phaseOrder" class="form-label required">Orden</label>
                            <input type="number" id="phaseOrder" th:field="*{phaseOrder}"
                                   class="form-control" th:classappend="${#fields.hasErrors('phaseOrder')} ? 'is-invalid'"
                                   min="1" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('phaseOrder')}"
                                 th:errors="*{phaseOrder}">Error</div>
                        </div>
                        <div class="col-md-4">
                            <label for="code" class="form-label required">C&oacute;digo</label>
                            <input type="text" id="code" th:field="*{code}"
                                   class="form-control" th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"
                                   maxlength="20" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('code')}"
                                 th:errors="*{code}">Error</div>
                        </div>
                        <div class="col-md-5">
                            <label for="name" class="form-label required">Nombre</label>
                            <input type="text" id="name" th:field="*{name}"
                                   class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   maxlength="200" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}">Error</div>
                        </div>
                        <div class="col-12">
                            <label for="description" class="form-label">Descripci&oacute;n</label>
                            <textarea id="description" th:field="*{description}"
                                      class="form-control" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                      rows="4" maxlength="4000"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                                 th:errors="*{description}">Error</div>
                        </div>
                    </div>

                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/templates/{id}/versions/{vId}/phases(id=${version.templateId}, vId=${version.id})}"
                           class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Guardar Fase
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

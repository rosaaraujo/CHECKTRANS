<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="es">
<head>
    <title>CHECKTRANS - Fases</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates}">Plantillas</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}(id=${version.templateId})}" th:text="${version.templateCode}">TMP-001</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions(id=${version.templateId})}">Versiones</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions/{vId}(id=${version.templateId}, vId=${version.id})}" th:text="'v' + ${version.versionNumber}">v1</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Fases</li>
                    </ol>
                </nav>
                <h1>
                    Fases de <span th:text="'v' + ${version.versionNumber} + ' - ' + ${version.templateName}">v1</span>
                </h1>
            </div>
            <div class="page-actions">
                <a th:href="@{/templates/{id}/versions/{vId}/phases/new(id=${version.templateId}, vId=${version.id})}" class="btn btn-accent">
                    <i class="fas fa-plus me-1"></i>Nueva Fase
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(phases)}">
            <div class="card card-checktrans">
                <div class="card-body">
                    <div class="empty-state">
                        <i class="fas fa-layer-group"></i>
                        <h5>No hay fases</h5>
                        <p>A&ntilde;ada fases a esta versi&oacute;n de la plantilla</p>
                        <a th:href="@{/templates/{id}/versions/{vId}/phases/new(id=${version.templateId}, vId=${version.id})}" class="btn btn-accent mt-2">
                            <i class="fas fa-plus me-1"></i>Crear Primera Fase
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${not #lists.isEmpty(phases)}">
            <div class="card card-checktrans">
                <div class="table-responsive">
                    <table class="table table-checktrans">
                        <thead>
                            <tr>
                                <th>Orden</th>
                                <th>C&oacute;digo</th>
                                <th>Nombre</th>
                                <th class="d-none d-md-table-cell">Descripci&oacute;n</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="phase : ${phases}">
                                <td data-label="Orden">
                                    <span class="badge bg-light text-dark" th:text="${phase.phaseOrder}">1</span>
                                </td>
                                <td data-label="C&oacute;digo">
                                    <strong th:text="${phase.code}">FASE-001</strong>
                                </td>
                                <td data-label="Nombre" th:text="${phase.name}">Documentaci&oacute;n</td>
                                <td data-label="Descripci&oacute;n" class="d-none d-md-table-cell"
                                    th:text="${phase.description}">Descripci&oacute;n</td>
                                <td data-label="Acciones" class="text-end">
                                    <div class="btn-group btn-group-sm">
                                        <form th:action="@{/templates/{id}/versions/{vId}/phases/{pId}/moveUp(id=${version.templateId}, vId=${version.id}, pId=${phase.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-secondary"
                                                    th:disabled="${phaseStat.first}"
                                                    th:title="Subir">
                                                <i class="fas fa-chevron-up"></i>
                                            </button>
                                        </form>
                                        <form th:action="@{/templates/{id}/versions/{vId}/phases/{pId}/moveDown(id=${version.templateId}, vId=${version.id}, pId=${phase.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-secondary"
                                                    th:disabled="${phaseStat.last}"
                                                    th:title="Bajar">
                                                <i class="fas fa-chevron-down"></i>
                                            </button>
                                        </form>
                                    </div>
                                    <a th:href="@{/templates/{id}/versions/{vId}/phases/{pId}/items(id=${version.templateId}, vId=${version.id}, pId=${phase.id})}"
                                       class="btn btn-sm btn-outline-info" th:title="Items">
                                        <i class="fas fa-list-check"></i>
                                    </a>
                                    <a th:href="@{/templates/{id}/versions/{vId}/phases/{pId}/edit(id=${version.templateId}, vId=${version.id}, pId=${phase.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form th:action="@{/templates/{id}/versions/{vId}/phases/{pId}/delete(id=${version.templateId}, vId=${version.id}, pId=${phase.id})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('&iquest;Est&aacute; seguro de eliminar esta fase?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

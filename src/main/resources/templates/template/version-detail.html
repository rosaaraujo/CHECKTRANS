<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="es">
<head>
    <title>CHECKTRANS - Versi&oacute;n</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates}">Plantillas</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}(id=${version.templateId})}" th:text="${version.templateCode}">TMP-001</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/templates/{id}/versions(id=${version.templateId})}">Versiones</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="'v' + ${version.versionNumber}">v1</li>
                    </ol>
                </nav>
                <h1>
                    Versi&oacute;n <span th:text="'v' + ${version.versionNumber}">v1</span>
                    <small class="text-muted fs-5" th:text="|${version.templateCode} - ${version.templateName}|">TMP-001</small>
                </h1>
            </div>
            <div class="page-actions">
                <a th:href="@{/templates/{id}/versions(id=${version.templateId})}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-1"></i>Volver
                </a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card card-checktrans mb-4">
                    <div class="card-header">
                        <h5><i class="fas fa-info-circle me-2"></i>Informaci&oacute;n de la Versi&oacute;n</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="text-muted small">N&uacute;mero de Versi&oacute;n</label>
                                <p class="fw-bold mb-0" th:text="'v' + ${version.versionNumber}">v1</p>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="text-muted small">Estado</label>
                                <p class="mb-0">
                                    <span th:if="${version.status == 'CREADA'}" class="badge bg-secondary" th:text="${version.status}">CREADA</span>
                                    <span th:if="${version.status == 'VERIFICADA'}" class="badge bg-info" th:text="${version.status}">VERIFICADA</span>
                                    <span th:if="${version.status == 'COMPROBADA'}" class="badge bg-success" th:text="${version.status}">COMPROBADA</span>
                                    <span th:if="${version.status == 'ANULADA'}" class="badge bg-danger" th:text="${version.status}">ANULADA</span>
                                </p>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="text-muted small">Activa</label>
                                <p class="mb-0">
                                    <span th:if="${version.activeVersion}" class="badge bg-success">
                                        <i class="fas fa-check me-1"></i>SI
                                    </span>
                                    <span th:unless="${version.activeVersion}" class="badge bg-secondary">NO</span>
                                </p>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small">Fecha de Publicaci&oacute;n</label>
                                <p class="fw-bold mb-0" th:text="${version.publicationDate} ? ${#temporals.format(version.publicationDate, 'dd/MM/yyyy')} : '-'">
                                    01/01/2024
                                </p>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small">Fecha de Efectividad</label>
                                <p class="fw-bold mb-0" th:text="${version.effectiveDate} ? ${#temporals.format(version.effectiveDate, 'dd/MM/yyyy')} : '-'">
                                    01/01/2024
                                </p>
                            </div>
                        </div>

                        <hr>
                        <div class="row text-muted small">
                            <div class="col">
                                <span>Creado: <span th:text="${#temporals.format(version.createdAt, 'dd/MM/yyyy HH:mm')}"></span></span>
                            </div>
                            <div class="col text-end">
                                <span>Actualizado: <span th:text="${#temporals.format(version.updatedAt, 'dd/MM/yyyy HH:mm')}"></span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-checktrans mb-4">
                    <div class="card-header">
                        <h5><i class="fas fa-cog me-2"></i>Acciones</h5>
                    </div>
                    <div class="card-body">
                        <a th:href="@{/templates/{id}/versions(id=${version.templateId})}"
                           class="btn btn-outline-secondary w-100 mb-2">
                            <i class="fas fa-history me-1"></i>Historial Completo
                        </a>
                        <a th:href="@{/templates/{id}(id=${version.templateId})}"
                           class="btn btn-outline-primary w-100">
                            <i class="fas fa-file-alt me-1"></i>Ir a Plantilla
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

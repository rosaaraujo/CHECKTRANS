<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="es">
<head>
    <title>CHECKTRANS - Plantillas</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Plantillas</li>
                    </ol>
                </nav>
                <h1>Plantillas</h1>
            </div>
            <div class="page-actions">
                <a th:href="@{/templates/new}" class="btn btn-accent">
                    <i class="fas fa-plus me-1"></i>Nueva Plantilla
                </a>
            </div>
        </div>

        <div class="card card-checktrans mb-4">
            <div class="card-header">
                <h5><i class="fas fa-search me-2"></i>Buscar</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/templates}" method="get" class="row g-3">
                    <div class="col-md-6">
                        <label for="search" class="form-label">Buscar por nombre</label>
                        <div class="input-group">
                            <input type="text" id="search" name="search"
                                   class="form-control" placeholder="Nombre de la plantilla..."
                                   th:value="${search}">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(templates.content)}">
            <div class="card card-checktrans">
                <div class="card-body">
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <h5>No hay plantillas</h5>
                        <p>Cree una nueva plantilla para comenzar</p>
                        <a th:href="@{/templates/new}" class="btn btn-accent mt-2">
                            <i class="fas fa-plus me-1"></i>Crear Primera Plantilla
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${not #lists.isEmpty(templates.content)}">
            <div class="card card-checktrans">
                <div class="table-responsive">
                    <table class="table table-checktrans">
                        <thead>
                            <tr>
                                <th>C&oacute;digo</th>
                                <th>Nombre</th>
                                <th class="d-none d-md-table-cell">Descripci&oacute;n</th>
                                <th>Versi&oacute;n</th>
                                <th>Activa</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="template : ${templates.content}">
                                <td data-label="C&oacute;digo">
                                    <strong th:text="${template.code}">TMP-001</strong>
                                </td>
                                <td data-label="Nombre" th:text="${template.name}">Plantilla</td>
                                <td data-label="Descripci&oacute;n" class="d-none d-md-table-cell"
                                    th:text="${template.description}">Descripci&oacute;n</td>
                                <td data-label="Versi&oacute;n">
                                    <span th:if="${template.currentVersionNumber}"
                                          class="badge bg-light text-dark"
                                          th:text="'v' + ${template.currentVersionNumber}">v1</span>
                                </td>
                                <td data-label="Activa">
                                    <span th:if="${template.active}" class="badge badge-status badge-completed">
                                        <i class="fas fa-check me-1"></i>SI
                                    </span>
                                    <span th:unless="${template.active}" class="badge badge-status badge-rejected">
                                        <i class="fas fa-times me-1"></i>NO
                                    </span>
                                </td>
                                <td data-label="Acciones" class="text-end">
                                    <a th:href="@{/checklists/from-template/{id}(id=${template.id})}"
                                       class="btn btn-sm btn-outline-accent" th:title="|Crear Lista|">
                                        <i class="fas fa-play"></i>
                                    </a>
                                    <a th:href="@{/templates/{id}(id=${template.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div th:if="${templates.totalPages > 1}" class="d-flex justify-content-center mt-4">
                <nav>
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${templates.number == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/templates(page=0, search=${search})}">
                                <i class="fas fa-angle-double-left"></i>
                            </a>
                        </li>
                        <li class="page-item" th:classappend="${templates.number == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/templates(page=${templates.number - 1}, search=${search})}">
                                <i class="fas fa-angle-left"></i>
                            </a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, templates.totalPages - 1)}"
                            th:classappend="${i == templates.number} ? 'active'">
                            <a class="page-link" th:href="@{/templates(page=${i}, search=${search})}"
                               th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${templates.number == templates.totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/templates(page=${templates.number + 1}, search=${search})}">
                                <i class="fas fa-angle-right"></i>
                            </a>
                        </li>
                        <li class="page-item" th:classappend="${templates.number == templates.totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/templates(page=${templates.totalPages - 1}, search=${search})}">
                                <i class="fas fa-angle-double-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>

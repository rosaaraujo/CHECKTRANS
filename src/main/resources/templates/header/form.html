<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="es">
<head>
    <title>CHECKTRANS - Cabecera</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/templates}">Plantillas</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/templates/{id}(id=${template.id})}" th:text="${template.code}">TMP-001</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/templates/{id}/headers(id=${template.id})}">Cabeceras</a></li>
                    <li class="breadcrumb-item active" aria-current="page" th:text="${headerId != null ? 'Editar Cabecera' : 'Nueva Cabecera'}">Nueva Cabecera</li>
                </ol>
            </nav>
            <h1 th:text="${headerId != null ? 'Editar Cabecera' : 'Nueva Cabecera'}">Nueva Cabecera</h1>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card card-checktrans">
                    <div class="card-header">
                        <h5><i class="fas fa-heading me-2"></i>Datos de la Cabecera</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="${headerId != null} ? @{/templates/{id}/headers/{hId}/edit(id=${template.id}, hId=${headerId})} : @{/templates/{id}/headers(id=${template.id})}"
                              th:object="${header}" method="post">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="headerOrder" class="form-label">Orden <span class="text-danger">*</span></label>
                                    <input type="number" id="headerOrder" name="headerOrder"
                                           class="form-control" min="1"
                                           th:value="${header.headerOrder}"
                                           th:errorclass="is-invalid" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('headerOrder')}"
                                         th:errors="*{headerOrder}">Error</div>
                                </div>
                                <div class="col-md-8 mb-3">
                                    <label for="code" class="form-label">C&oacute;digo <span class="text-danger">*</span></label>
                                    <input type="text" id="code" name="code"
                                           class="form-control" maxlength="20"
                                           th:value="${header.code}"
                                           th:errorclass="is-invalid" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('code')}"
                                         th:errors="*{code}">Error</div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="label" class="form-label">Etiqueta <span class="text-danger">*</span></label>
                                <input type="text" id="label" name="label"
                                       class="form-control" maxlength="200"
                                       th:value="${header.label}"
                                       th:errorclass="is-invalid" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('label')}"
                                     th:errors="*{label}">Error</div>
                            </div>

                            <div class="mb-3">
                                <label for="headerType" class="form-label">Tipo <span class="text-danger">*</span></label>
                                <select id="headerType" name="headerType"
                                        class="form-select"
                                        th:errorclass="is-invalid" required>
                                    <option value="">Seleccione un tipo</option>
                                    <option th:each="type : ${headerTypes}"
                                            th:value="${type}"
                                            th:text="${type}"
                                            th:selected="${header.headerType == type}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('headerType')}"
                                     th:errors="*{headerType}">Error</div>
                            </div>

                            <div class="mb-3" id="optionsGroup" style="display:none;">
                                <label for="options" class="form-label">Opciones</label>
                                <textarea id="options" name="options"
                                          class="form-control" rows="3" maxlength="4000"
                                          placeholder="Una opci&oacute;n por l&iacute;nea"
                                          th:errorclass="is-invalid" th:text="${header.options}"></textarea>
                                <div class="form-text">Ingrese una opci&oacute;n por l&iacute;nea (solo para tipo Selecci&oacute;n)</div>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('options')}"
                                     th:errors="*{options}">Error</div>
                            </div>

                            <div class="mb-3">
                                <div class="form-check form-switch">
                                    <input type="checkbox" id="required" name="required"
                                           class="form-check-input" value="true"
                                           th:checked="${header.required}"
                                           th:errorclass="is-invalid">
                                    <label class="form-check-label" for="required">Campo obligatorio</label>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i>Guardar Cabecera
                                </button>
                                <a th:href="@{/templates/{id}/headers(id=${template.id})}" class="btn btn-outline-secondary">
                                    Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var typeSelect = document.getElementById('headerType');
            var optionsGroup = document.getElementById('optionsGroup');

            function toggleOptions() {
                if (typeSelect.value === 'SELECT') {
                    optionsGroup.style.display = 'block';
                } else {
                    optionsGroup.style.display = 'none';
                }
            }

            typeSelect.addEventListener('change', toggleOptions);
            toggleOptions();
        });
    </script>
</body>
</html>
